{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} GovApplication | NexusGovt{% endblock %}
{% block page_title %}{% if editing %}Edit GovApplication{% else %}New GovApplication{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Application Id</label>
        <input type="text" name="application_id" value="{{ record.application_id|default:'' }}">
      </div>
      <div class="form-group">
        <label>Citizen Name</label>
        <input type="text" name="citizen_name" value="{{ record.citizen_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Service Name</label>
        <input type="text" name="service_name" value="{{ record.service_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="submitted" {% if record.status == 'submitted' %}selected{% endif %}>Submitted</option>
          <option value="under_review" {% if record.status == 'under_review' %}selected{% endif %}>Under Review</option>
          <option value="approved" {% if record.status == 'approved' %}selected{% endif %}>Approved</option>
          <option value="rejected" {% if record.status == 'rejected' %}selected{% endif %}>Rejected</option>
          <option value="pending_info" {% if record.status == 'pending_info' %}selected{% endif %}>Pending Info</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Submitted Date</label>
        <input type="date" name="submitted_date" value="{{ record.submitted_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Processed Date</label>
        <input type="date" name="processed_date" value="{{ record.processed_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Remarks</label>
      <textarea name="remarks">{{ record.remarks|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} GovApplication</button>
      <a href="/govapplications/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
